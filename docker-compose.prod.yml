services:
  api:
    build: .
    image: eshop-api:latest
    env_file:
      - .env
    ports:
      - "8080:8080"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health/redis"]
      interval: 30s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          memory: 768m

  postgres:
    image: postgres:15-alpine
    command: ["postgres", "-c", "max_connections=200"]
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-eshop}
      POSTGRES_USER: ${POSTGRES_USER:-postgres_admin}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-change-me}
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres_admin}"]
      interval: 30s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    command: ["redis-server", "--save", "", "--appendonly", "yes"]
    ports:
      - "6379:6379"
    volumes:
      - redisdata:/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 30s
      timeout: 5s
      retries: 5

  directus:
    image: directus/directus:${DIRECTUS_VERSION:-11.17.2}
    env_file:
      - .env
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    ports:
      - "8055:8055"
    restart: unless-stopped
    environment:
      KEY: ${DIRECTUS_KEY:?Set DIRECTUS_KEY in the deployment .env}
      SECRET: ${DIRECTUS_SECRET:?Set DIRECTUS_SECRET in the deployment .env}
      ADMIN_EMAIL: ${DIRECTUS_ADMIN_EMAIL:?Set DIRECTUS_ADMIN_EMAIL in the deployment .env}
      ADMIN_PASSWORD: ${DIRECTUS_ADMIN_PASSWORD:?Set DIRECTUS_ADMIN_PASSWORD in the deployment .env}
      PUBLIC_URL: ${DIRECTUS_PUBLIC_URL:?Set DIRECTUS_PUBLIC_URL in the deployment .env}
      DIRECTUS_SCHEMA_ADMIN_TOKEN: ${DIRECTUS_SCHEMA_ADMIN_TOKEN:-}
      AUTH_PROVIDERS: ${DIRECTUS_AUTH_PROVIDERS:-keycloak}
      AUTH_DISABLE_DEFAULT: ${DIRECTUS_AUTH_DISABLE_DEFAULT:-true}
      AUTH_KEYCLOAK_DRIVER: ${DIRECTUS_AUTH_KEYCLOAK_DRIVER:-openid}
      AUTH_KEYCLOAK_CLIENT_ID: ${DIRECTUS_AUTH_KEYCLOAK_CLIENT_ID:?Set DIRECTUS_AUTH_KEYCLOAK_CLIENT_ID in the deployment .env}
      AUTH_KEYCLOAK_CLIENT_SECRET: ${DIRECTUS_AUTH_KEYCLOAK_CLIENT_SECRET:?Set DIRECTUS_AUTH_KEYCLOAK_CLIENT_SECRET in the deployment .env}
      AUTH_KEYCLOAK_ISSUER_URL: ${DIRECTUS_AUTH_KEYCLOAK_ISSUER_URL:?Set DIRECTUS_AUTH_KEYCLOAK_ISSUER_URL in the deployment .env}
      AUTH_KEYCLOAK_IDENTIFIER_KEY: ${DIRECTUS_AUTH_KEYCLOAK_IDENTIFIER_KEY:-email}
      AUTH_KEYCLOAK_ALLOW_PUBLIC_REGISTRATION: ${DIRECTUS_AUTH_KEYCLOAK_ALLOW_PUBLIC_REGISTRATION:-true}
      AUTH_KEYCLOAK_REQUIRE_VERIFIED_EMAIL: ${DIRECTUS_AUTH_KEYCLOAK_REQUIRE_VERIFIED_EMAIL:-true}
      AUTH_KEYCLOAK_SYNC_USER_INFO: ${DIRECTUS_AUTH_KEYCLOAK_SYNC_USER_INFO:-true}
      AUTH_KEYCLOAK_GROUP_CLAIM_NAME: ${DIRECTUS_AUTH_KEYCLOAK_GROUP_CLAIM_NAME:-groups}
      AUTH_KEYCLOAK_LABEL: ${DIRECTUS_AUTH_KEYCLOAK_LABEL:-Keycloak}
      AUTH_KEYCLOAK_ICON: ${DIRECTUS_AUTH_KEYCLOAK_ICON:-vpn_key}
      AUTH_KEYCLOAK_ROLE_MAPPING: ${DIRECTUS_AUTH_KEYCLOAK_ROLE_MAPPING:?Set DIRECTUS_AUTH_KEYCLOAK_ROLE_MAPPING in the deployment .env}
      DB_CLIENT: pg
      DB_HOST: postgres
      DB_PORT: 5432
      DB_DATABASE: ${DIRECTUS_DB_DATABASE:?Set DIRECTUS_DB_DATABASE in the deployment .env}
      DB_USER: ${DIRECTUS_DB_USER:?Set DIRECTUS_DB_USER in the deployment .env}
      DB_PASSWORD: ${DIRECTUS_DB_PASSWORD:?Set DIRECTUS_DB_PASSWORD in the deployment .env}
      CACHE_ENABLED: ${DIRECTUS_DATA_CACHE_ENABLED:-true}
      CACHE_TTL: ${DIRECTUS_DATA_CACHE_TTL:-5m}
      CACHE_AUTO_PURGE: ${DIRECTUS_DATA_CACHE_AUTO_PURGE:-true}
      CACHE_STORE: ${DIRECTUS_DATA_CACHE_STORE:-redis}
      CACHE_STATUS_HEADER: ${DIRECTUS_DATA_CACHE_STATUS_HEADER:-X-Directus-Cache}
      REDIS: ${DIRECTUS_REDIS_URL:-redis://redis:6379}
      STORAGE_LOCATIONS: ${DIRECTUS_STORAGE_LOCATIONS:-s3}
      STORAGE_S3_DRIVER: ${DIRECTUS_STORAGE_S3_DRIVER:-s3}
      STORAGE_S3_KEY: ${DIRECTUS_STORAGE_S3_KEY:?Set DIRECTUS_STORAGE_S3_KEY in the deployment .env}
      STORAGE_S3_SECRET: ${DIRECTUS_STORAGE_S3_SECRET:?Set DIRECTUS_STORAGE_S3_SECRET in the deployment .env}
      STORAGE_S3_BUCKET: ${DIRECTUS_STORAGE_S3_BUCKET:?Set DIRECTUS_STORAGE_S3_BUCKET in the deployment .env}
      STORAGE_S3_REGION: ${DIRECTUS_STORAGE_S3_REGION:-ru-central1}
      STORAGE_S3_ENDPOINT: ${DIRECTUS_STORAGE_S3_ENDPOINT:-https://storage.yandexcloud.net}
      STORAGE_S3_FORCE_PATH_STYLE: ${DIRECTUS_STORAGE_S3_FORCE_PATH_STYLE:-false}
      STOREFRONT_OPS_BACKEND_URL: ${DIRECTUS_STOREFRONT_OPS_BACKEND_URL:-http://api:8080}
      STOREFRONT_OPS_BACKEND_TOKEN: ${DIRECTUS_BRIDGE_TOKEN:?Set DIRECTUS_BRIDGE_TOKEN in the deployment .env}
      STOREFRONT_OPS_CATALOGUE_ROLE_IDS: ${DIRECTUS_STOREFRONT_OPS_CATALOGUE_ROLE_IDS:?Set DIRECTUS_STOREFRONT_OPS_CATALOGUE_ROLE_IDS in the deployment .env}
      STOREFRONT_OPS_INVENTORY_ROLE_IDS: ${DIRECTUS_STOREFRONT_OPS_INVENTORY_ROLE_IDS:?Set DIRECTUS_STOREFRONT_OPS_INVENTORY_ROLE_IDS in the deployment .env}
      WEBSOCKETS_ENABLED: "true"
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "fetch('http://127.0.0.1:8055/server/health').then((response)=>process.exit(response.ok?0:1)).catch(()=>process.exit(1))"
        ]
      interval: 30s
      timeout: 5s
      retries: 10
    volumes:
      - ./directus/runtime-extensions:/directus/extensions:ro
      - directus-templates:/directus/templates
      - ./directus:/opt/directus-deploy/directus:ro
      - ./scripts:/opt/directus-deploy/scripts:ro

volumes:
  redisdata:
  pgdata:
  directus-templates:
