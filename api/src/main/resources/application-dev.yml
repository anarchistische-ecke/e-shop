spring:
  security:
    oauth2:
      resourceserver:
        jwt:
          issuer-uri: ${KEYCLOAK_ISSUER_URI:http://localhost:8081/realms/cozyhome}
  config:
    activate:
      on-profile: dev
  datasource:
    url: jdbc:postgresql://localhost:5433/eshop?sslmode=disable
    username: eshopUser
    password: eshop
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
  flyway:
    enabled: false
  data:
    redis:
      host: localhost
      port: 6379
      timeout: 5000

cors:
  allowed-origins: "http://localhost:3000"
  allowed-methods: "*"
  allowed-headers: "*"

directus:
  base-url: ${DIRECTUS_BASE_URL:http://localhost:8055}
  public-url: ${DIRECTUS_PUBLIC_URL:${DIRECTUS_BASE_URL:http://localhost:8055}}
  static-token: ${DIRECTUS_STATIC_TOKEN:}
  cache-ttl: ${DIRECTUS_CACHE_TTL:PT5M}
  cache-stale-ttl: ${DIRECTUS_CACHE_STALE_TTL:PT1H}
  cache-key-prefix: ${DIRECTUS_CACHE_KEY_PREFIX:cms:content}
  response-cache-max-age: ${DIRECTUS_RESPONSE_CACHE_MAX_AGE:PT1M}
  response-cache-stale-while-revalidate: ${DIRECTUS_RESPONSE_CACHE_STALE_WHILE_REVALIDATE:PT5M}
  response-cache-stale-if-error: ${DIRECTUS_RESPONSE_CACHE_STALE_IF_ERROR:PT1H}
  connect-timeout: ${DIRECTUS_CONNECT_TIMEOUT:PT3S}
  read-timeout: ${DIRECTUS_READ_TIMEOUT:PT5S}
  slow-request-threshold: ${DIRECTUS_SLOW_REQUEST_THRESHOLD:PT2S}

yookassa:
  enabled: ${YOOKASSA_ENABLED:false}
  base-url: ${YOOKASSA_BASE_URL:https://api.yookassa.ru/v3}
  shop-id: ${YOOKASSA_SHOP_ID:1348143}
  secret-key: ${YOOKASSA_SECRET_KEY:}

yandex:
  storage:
    bucket: ${YANDEX_STORAGE_BUCKET:directus}
    access-key: ${YANDEX_STORAGE_KEY:minioadmin}
    secret-key: ${YANDEX_STORAGE_SECRET:minioadmin123}
    endpoint: ${YANDEX_STORAGE_ENDPOINT:http://localhost:9000}
    public-base-url: ${YANDEX_STORAGE_PUBLIC_BASE_URL:http://localhost:9000/directus}

media:
  derivatives:
    public-base-url: ${MEDIA_DERIVATIVES_PUBLIC_BASE_URL:http://localhost:9000/directus}
    path-prefix: ${MEDIA_DERIVATIVES_PATH_PREFIX:media}

catalogue:
  product-image-preview-base-url: ${CATALOGUE_PRODUCT_IMAGE_PREVIEW_BASE_URL:http://localhost:8080/products/images}
  media:
    upload:
      enabled: ${CATALOGUE_MEDIA_UPLOAD_ENABLED:true}
      derivative-bucket: ${MEDIA_DERIVATIVES_BUCKET:${YANDEX_STORAGE_BUCKET:directus}}
      node-executable: ${MEDIA_IMAGE_NODE_EXECUTABLE:node}
      processor-script: ${MEDIA_IMAGE_PROCESSOR_SCRIPT:scripts/media-derivatives/process-image.mjs}
      derivative-config: ${MEDIA_DERIVATIVES_CONFIG:api/src/main/resources/media-derivatives.json}

management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus
