spring:
  security:
    oauth2:
      resourceserver:
        jwt:
          issuer-uri: ${KEYCLOAK_ISSUER_URI:http://localhost:8081/realms/cozyhome}
  config:
    activate:
      on-profile: dev
  datasource:
    url: jdbc:postgresql://localhost:5433/eshop?sslmode=disable
    username: eshopUser
    password: eshop
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
  flyway:
    enabled: false
  data:
    redis:
      host: localhost
      port: 6379
      timeout: 5000

cors:
  allowed-origins: "http://localhost:3000"
  allowed-methods: "*"
  allowed-headers: "*"

directus:
  base-url: ${DIRECTUS_BASE_URL:http://localhost:8055}
  static-token: ${DIRECTUS_STATIC_TOKEN:}
  cache-ttl: ${DIRECTUS_CACHE_TTL:PT5M}
  cache-key-prefix: ${DIRECTUS_CACHE_KEY_PREFIX:cms:content}
  connect-timeout: ${DIRECTUS_CONNECT_TIMEOUT:PT3S}
  read-timeout: ${DIRECTUS_READ_TIMEOUT:PT5S}
