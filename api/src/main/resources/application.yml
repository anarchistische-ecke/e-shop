logging:
  pattern:
    console: "%d{yyyy-MM-dd'T'HH:mm:ss.SSSXXX} %5p [%thread] %logger{36} : %msg %kvp%n"

management:
  endpoint:
    health:
      probes:
        enabled: true
  metrics:
    tags:
      application: eshop-api
    distribution:
      percentiles-histogram:
        http.server.requests: true
        cms.directus.request: true

mail:
  from: ${MAIL_FROM:yug-postel@yandex.ru}
  reply-to: ${MAIL_REPLY_TO:}

notifications:
  enabled: ${NOTIFICATIONS_ENABLED:true}
  max-attempts: ${NOTIFICATIONS_MAX_ATTEMPTS:3}
  retry-delay: ${NOTIFICATIONS_RETRY_DELAY:5m}
  batch-size: ${NOTIFICATIONS_BATCH_SIZE:20}
  dispatcher:
    enabled: ${NOTIFICATIONS_DISPATCHER_ENABLED:true}
    fixed-delay-ms: ${NOTIFICATIONS_DISPATCHER_FIXED_DELAY_MS:30000}
  tracking-url-templates:
    cdek: ${NOTIFICATIONS_TRACKING_URL_CDEK:https://www.cdek.ru/ru/tracking?order_id={trackingNumber}}
    pochta: ${NOTIFICATIONS_TRACKING_URL_POCHTA:https://www.pochta.ru/tracking#{trackingNumber}}
    boxberry: ${NOTIFICATIONS_TRACKING_URL_BOXBERRY:https://boxberry.ru/tracking-page?id={trackingNumber}}

app:
  security:
    directus-bridge-token: ${DIRECTUS_BRIDGE_TOKEN:}
  observability:
    prometheus-token: ${APP_OBSERVABILITY_PROMETHEUS_TOKEN:}
  rate-limit:
    enabled: ${APP_RATE_LIMIT_ENABLED:true}
    checkout:
      limit: ${APP_RATE_LIMIT_CHECKOUT_LIMIT:10}
      window-seconds: ${APP_RATE_LIMIT_CHECKOUT_WINDOW_SECONDS:60}
    cart:
      limit: ${APP_RATE_LIMIT_CART_LIMIT:90}
      window-seconds: ${APP_RATE_LIMIT_CART_WINDOW_SECONDS:60}
    order-token:
      limit: ${APP_RATE_LIMIT_ORDER_TOKEN_LIMIT:30}
      window-seconds: ${APP_RATE_LIMIT_ORDER_TOKEN_WINDOW_SECONDS:60}
    webhook:
      limit: ${APP_RATE_LIMIT_WEBHOOK_LIMIT:120}
      window-seconds: ${APP_RATE_LIMIT_WEBHOOK_WINDOW_SECONDS:60}
    privileged:
      limit: ${APP_RATE_LIMIT_PRIVILEGED_LIMIT:120}
      window-seconds: ${APP_RATE_LIMIT_PRIVILEGED_WINDOW_SECONDS:60}

media:
  derivatives:
    public-base-url: ${MEDIA_DERIVATIVES_PUBLIC_BASE_URL:https://img.yug-postel.ru}
    path-prefix: ${MEDIA_DERIVATIVES_PATH_PREFIX:media}
