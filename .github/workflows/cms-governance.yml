name: cms-governance

on:
  pull_request:
    branches: [ main ]
    types: [ opened, reopened, synchronize, ready_for_review, edited ]
  pull_request_review:
    types: [ submitted, dismissed ]

permissions:
  contents: read
  pull-requests: read

jobs:
  review-gate:
    runs-on: ubuntu-latest
    steps:
      - name: Enforce CMS schema governance
        uses: actions/github-script@v7
        with:
          script: |
            const pr = context.payload.pull_request;

            if (!pr) {
              core.setFailed('cms-governance requires pull request context.');
              return;
            }

            const governedPaths = [
              'directus/schema/schema.snapshot.json',
              'docs/directus-content-model.md',
              'docs/directus-schema-versioning.md',
              'scripts/directus-content-model-bootstrap.sh',
              'scripts/directus-published-at-bootstrap.sh',
              'scripts/directus-schema.js',
              'scripts/directus-schema-apply.sh',
              'scripts/directus-schema-check.sh',
              'scripts/directus-schema-snapshot.sh',
            ];

            function isGovernedPath(filename) {
              return governedPaths.some((path) => filename === path || filename.startsWith(`${path}/`));
            }

            const files = await github.paginate(github.rest.pulls.listFiles, {
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: pr.number,
              per_page: 100,
            });

            const governedFiles = files
              .map((file) => file.filename)
              .filter(isGovernedPath)
              .sort();

            if (governedFiles.length === 0) {
              core.notice('No governed CMS schema/content-model files changed in this pull request.');
              return;
            }

            if (pr.draft) {
              core.notice(
                `Governed CMS files changed (${governedFiles.join(', ')}), but the pull request is still draft. ` +
                'The two-review gate starts when the PR is ready for review.'
              );
              return;
            }

            const reviews = await github.paginate(github.rest.pulls.listReviews, {
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: pr.number,
              per_page: 100,
            });

            reviews.sort((left, right) => {
              const leftDate = new Date(left.submitted_at || left.created_at || 0);
              const rightDate = new Date(right.submitted_at || right.created_at || 0);
              return leftDate - rightDate;
            });

            const approvalState = new Map();
            const currentHeadSha = pr.head.sha;
            const authorLogin = pr.user?.login;

            for (const review of reviews) {
              const reviewer = review.user?.login;

              if (!reviewer || reviewer === authorLogin) {
                continue;
              }

              if (review.state === 'DISMISSED') {
                approvalState.set(reviewer, false);
                continue;
              }

              if (review.commit_id !== currentHeadSha) {
                continue;
              }

              if (review.state === 'APPROVED') {
                approvalState.set(reviewer, true);
                continue;
              }

              if (review.state === 'CHANGES_REQUESTED') {
                approvalState.set(reviewer, false);
              }
            }

            const approvers = Array.from(approvalState.entries())
              .filter(([, approved]) => approved)
              .map(([reviewer]) => reviewer)
              .sort();

            const governedSummary = governedFiles.join(', ');

            if (approvers.length < 2) {
              core.setFailed(
                `CMS schema/content-model changes require two non-author approvals on the current head commit. ` +
                `Current approvals: ${approvers.length}/2 (${approvers.join(', ') || 'none'}). ` +
                `Governed files: ${governedSummary}.`
              );
              return;
            }

            core.notice(
              `CMS governance satisfied with ${approvers.length} approvals on the current head commit ` +
              `(${approvers.join(', ')}). Governed files: ${governedSummary}.`
            );
