name: backend-ci

permissions:
  contents: read
  packages: read

on:
  pull_request:
    branches: [ main ]
  workflow_dispatch:
    inputs:
      ref:
        description: Git ref to validate
        required: true
        default: main
        type: string

jobs:
  ci:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ github.event_name == 'workflow_dispatch' && inputs.ref || github.ref }}

      - name: Classify change set
        run: |
          if git rev-parse --verify HEAD^ >/dev/null 2>&1; then
            bash ./scripts/classify-change-set.sh --base-ref HEAD^ --head-ref HEAD
          else
            bash ./scripts/classify-change-set.sh --head-ref HEAD
          fi

      - name: Verify production release drift guard
        run: bash ./scripts/tests/check-stack-health-release-drift.test.sh

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Validate committed Directus schema snapshot
        run: node scripts/directus-schema.js validate --snapshot directus/schema/schema.snapshot.json

      - name: Verify committed Directus runtime extensions are up to date
        run: bash ./scripts/directus-extensions-build.sh --check

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21
          cache: maven

      - name: Build and test
        run: ./mvnw -B -ntp -pl api -am verify
