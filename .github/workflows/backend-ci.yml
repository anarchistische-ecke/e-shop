name: backend-ci

permissions:
  contents: read
  packages: write

on:
  push:
    branches: [ main, add-cms ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:
    inputs:
      environment:
        description: Deployment environment
        required: true
        default: production
        type: choice
        options:
          - staging
          - production
      ref:
        description: Git ref to deploy
        required: true
        default: main
        type: string

jobs:
  build:
    runs-on: ubuntu-latest
    outputs:
      image_repository: ${{ steps.image.outputs.repository }}
      image_tag: ${{ steps.git.outputs.sha }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event_name == 'workflow_dispatch' && inputs.ref || github.ref }}

      - name: Capture git metadata
        id: git
        run: |
          echo "sha=$(git rev-parse HEAD)" >> "$GITHUB_OUTPUT"

      - name: Compute image coordinates
        id: image
        run: |
          owner_lc="${GITHUB_REPOSITORY_OWNER,,}"
          echo "repository=ghcr.io/${owner_lc}/eshop-api" >> "$GITHUB_OUTPUT"

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Validate committed Directus schema snapshot
        run: node scripts/directus-schema.js validate --snapshot directus/schema/schema.snapshot.json

      - name: Build Directus extensions
        run: bash ./scripts/directus-extensions-build.sh

      - name: Verify committed Directus runtime extensions are up to date
        run: git diff --exit-code -- directus/runtime-extensions

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21
          cache: maven

      - name: Build and test
        run: ./mvnw -B -ntp -pl api -am verify

      - name: Package API jar
        run: ./mvnw -B -ntp -pl api -am package -DskipTests

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        if: ${{ github.event_name != 'pull_request' }}
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push API image
        if: ${{ github.event_name != 'pull_request' }}
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: |
            ${{ steps.image.outputs.repository }}:${{ steps.git.outputs.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    needs: build
    if: |
      (
        github.event_name == 'workflow_dispatch' ||
        (github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/add-cms'))
      )
    runs-on: ubuntu-latest
    environment: ${{ github.event_name == 'workflow_dispatch' && inputs.environment || (github.ref == 'refs/heads/main' && 'production' || 'staging') }}
    concurrency:
      group: deploy-${{ github.event_name == 'workflow_dispatch' && inputs.environment || (github.ref == 'refs/heads/main' && 'production' || 'staging') }}
      cancel-in-progress: false
    env:
      DEPLOY_ENVIRONMENT: ${{ github.event_name == 'workflow_dispatch' && inputs.environment || (github.ref == 'refs/heads/main' && 'production' || 'staging') }}
      DEPLOY_REF: ${{ github.event_name == 'workflow_dispatch' && inputs.ref || (github.ref == 'refs/heads/main' && 'main' || 'add-cms') }}
      YC_VM_HOST: ${{ secrets.YC_VM_HOST }}
      YC_VM_USER: ${{ secrets.YC_VM_USER }}
      YC_VM_SSH_KEY: ${{ secrets.YC_VM_SSH_KEY }}
      YC_VM_DEPLOY_PATH: ${{ secrets.YC_VM_DEPLOY_PATH }}
      GHCR_PULL_USERNAME: ${{ secrets.GHCR_PULL_USERNAME }}
      GHCR_PULL_TOKEN: ${{ secrets.GHCR_PULL_TOKEN }}
      API_IMAGE_REPOSITORY: ${{ needs.build.outputs.image_repository }}
      API_IMAGE_TAG: ${{ needs.build.outputs.image_tag }}
    steps:
      - name: Skip deploy when VM secrets are not configured
        if: ${{ env.YC_VM_HOST == '' || env.YC_VM_USER == '' || env.YC_VM_SSH_KEY == '' || env.YC_VM_DEPLOY_PATH == '' }}
        run: |
          echo "Skipping deploy because one or more VM deployment secrets are missing."

      - name: Build and deploy on VM
        if: ${{ env.YC_VM_HOST != '' && env.YC_VM_USER != '' && env.YC_VM_SSH_KEY != '' && env.YC_VM_DEPLOY_PATH != '' }}
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ env.YC_VM_HOST }}
          username: ${{ env.YC_VM_USER }}
          key: ${{ env.YC_VM_SSH_KEY }}
          command_timeout: 45m
          envs: API_IMAGE_REPOSITORY,API_IMAGE_TAG,GHCR_PULL_USERNAME,GHCR_PULL_TOKEN
          script: |
            set -euo pipefail
            echo "Remote deploy started"
            if [ -n "${GHCR_PULL_USERNAME:-}" ] && [ -n "${GHCR_PULL_TOKEN:-}" ]; then
              echo "Logging into GHCR..."
              printf '%s' "$GHCR_PULL_TOKEN" | docker login ghcr.io -u "$GHCR_PULL_USERNAME" --password-stdin
              echo "GHCR login complete"
            else
              echo "GHCR pull credentials are not set in GitHub secrets. Using existing docker login on the VM or a public package."
            fi
            echo "Updating repo checkout..."
            cd ${{ env.YC_VM_DEPLOY_PATH }}
            git fetch origin "${{ env.DEPLOY_REF }}"
            git checkout "${{ env.DEPLOY_REF }}" || git checkout -b "${{ env.DEPLOY_REF }}" "origin/${{ env.DEPLOY_REF }}"
            git pull --ff-only origin "${{ env.DEPLOY_REF }}"
            echo "Running deploy script..."
            bash ./scripts/deploy-stack.sh --env-file .env --compose-file docker-compose.prod.yml
