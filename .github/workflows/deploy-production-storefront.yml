name: deploy-production-storefront

permissions:
  contents: read
  packages: read

on:
  workflow_dispatch:
    inputs:
      ref:
        description: e-shop ref to deploy from
        required: true
        default: main
        type: string
      storefront_image_repository:
        description: Storefront image repository
        required: true
        type: string
      storefront_image_tag:
        description: Storefront image tag to deploy
        required: true
        type: string

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: production
    concurrency:
      group: deploy-production-storefront
      cancel-in-progress: false
    env:
      DEPLOY_REF: ${{ inputs.ref }}
      DEPLOY_RUN_ID: ${{ github.run_id }}
      STOREFRONT_IMAGE_REPOSITORY: ${{ inputs.storefront_image_repository }}
      STOREFRONT_IMAGE_TAG: ${{ inputs.storefront_image_tag }}
      YC_VM_HOST: ${{ secrets.YC_VM_HOST }}
      YC_VM_USER: ${{ secrets.YC_VM_USER }}
      YC_VM_SSH_KEY: ${{ secrets.YC_VM_SSH_KEY }}
      YC_VM_DEPLOY_PATH: ${{ secrets.YC_VM_DEPLOY_PATH }}
      GHCR_PULL_USERNAME: ${{ secrets.GHCR_PULL_USERNAME }}
      GHCR_PULL_TOKEN: ${{ secrets.GHCR_PULL_TOKEN }}
    steps:
      - name: Skip deploy when VM secrets are not configured
        if: ${{ env.YC_VM_HOST == '' || env.YC_VM_USER == '' || env.YC_VM_SSH_KEY == '' || env.YC_VM_DEPLOY_PATH == '' }}
        run: |
          echo "Skipping production storefront deploy because one or more VM deployment secrets are missing."

      - name: Deploy storefront on production VM
        id: deploy_remote
        if: ${{ env.YC_VM_HOST != '' && env.YC_VM_USER != '' && env.YC_VM_SSH_KEY != '' && env.YC_VM_DEPLOY_PATH != '' }}
        continue-on-error: true
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ env.YC_VM_HOST }}
          username: ${{ env.YC_VM_USER }}
          key: ${{ env.YC_VM_SSH_KEY }}
          command_timeout: 20m
          envs: DEPLOY_REF,DEPLOY_RUN_ID,STOREFRONT_IMAGE_REPOSITORY,STOREFRONT_IMAGE_TAG,GHCR_PULL_USERNAME,GHCR_PULL_TOKEN
          script: |
            set -euo pipefail
            if [ -n "${GHCR_PULL_USERNAME:-}" ] && [ -n "${GHCR_PULL_TOKEN:-}" ]; then
              printf '%s' "$GHCR_PULL_TOKEN" | docker login ghcr.io -u "$GHCR_PULL_USERNAME" --password-stdin
            fi
            cd "${{ env.YC_VM_DEPLOY_PATH }}"
            git fetch origin "${DEPLOY_REF}"
            git checkout "${DEPLOY_REF}" || git checkout -B "${DEPLOY_REF}" "origin/${DEPLOY_REF}"
            git pull --ff-only origin "${DEPLOY_REF}"
            bash ./scripts/deploy-storefront-image.sh \
              --env-file .env \
              --compose-file docker-compose.runtime-slot.yml \
              --storefront-image-repository "${STOREFRONT_IMAGE_REPOSITORY}" \
              --storefront-image-tag "${STOREFRONT_IMAGE_TAG}" \
              --run-id "${DEPLOY_RUN_ID}"

      - name: Stage remote diagnostics
        if: ${{ steps.deploy_remote.outcome == 'failure' }}
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ env.YC_VM_HOST }}
          username: ${{ env.YC_VM_USER }}
          key: ${{ env.YC_VM_SSH_KEY }}
          script: |
            set -euo pipefail
            cd "${{ env.YC_VM_DEPLOY_PATH }}"
            mkdir -p .deploy-state/export
            cp .deploy-state/latest-storefront-summary.txt .deploy-state/export/storefront-summary.txt 2>/dev/null || true
            latest_log="$(ls -1t .deploy-state/logs/storefront-deploy-*.log 2>/dev/null | head -n 1 || true)"
            if [ -n "$latest_log" ]; then
              cp "$latest_log" .deploy-state/export/
            fi

      - name: Download remote diagnostics
        if: ${{ steps.deploy_remote.outcome == 'failure' }}
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ env.YC_VM_HOST }}
          username: ${{ env.YC_VM_USER }}
          key: ${{ env.YC_VM_SSH_KEY }}
          source: "${{ env.YC_VM_DEPLOY_PATH }}/.deploy-state/export/*"
          target: "storefront-diagnostics-production"

      - name: Upload diagnostics artifact
        if: ${{ steps.deploy_remote.outcome == 'failure' }}
        uses: actions/upload-artifact@v4
        with:
          name: production-storefront-deploy-diagnostics-${{ inputs.storefront_image_tag }}
          path: storefront-diagnostics-production
          if-no-files-found: warn

      - name: Fail workflow after remote deploy error
        if: ${{ steps.deploy_remote.outcome == 'failure' }}
        run: |
          echo "Production storefront deploy failed. See uploaded diagnostics."
          exit 1
