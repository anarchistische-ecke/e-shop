name: deploy-production-storefront

permissions:
  contents: read
  packages: read

on:
  workflow_dispatch:
    inputs:
      ref:
        description: e-shop ref to deploy from
        required: true
        default: main
        type: string
      storefront_image_repository:
        description: Storefront image repository
        required: true
        type: string
      storefront_image_tag:
        description: Storefront image tag to deploy
        required: true
        type: string

jobs:
  deploy:
    runs-on: [self-hosted, prod-vm, prod-deploy]
    environment: production
    concurrency:
      group: deploy-production-storefront
      cancel-in-progress: false
    env:
      DEPLOY_REF: ${{ inputs.ref }}
      DEPLOY_RUN_ID: ${{ github.run_id }}
      STOREFRONT_IMAGE_REPOSITORY: ${{ inputs.storefront_image_repository }}
      STOREFRONT_IMAGE_TAG: ${{ inputs.storefront_image_tag }}
      YC_VM_DEPLOY_PATH: ${{ secrets.YC_VM_DEPLOY_PATH }}
      GHCR_PULL_USERNAME: ${{ secrets.GHCR_PULL_USERNAME }}
      GHCR_PULL_TOKEN: ${{ secrets.GHCR_PULL_TOKEN }}
    steps:
      - name: Skip deploy when VM deploy path is not configured
        if: ${{ env.YC_VM_DEPLOY_PATH == '' }}
        run: |
          echo "Skipping production storefront deploy because YC_VM_DEPLOY_PATH is missing."

      - name: Deploy storefront on production VM
        id: deploy_remote
        if: ${{ env.YC_VM_DEPLOY_PATH != '' }}
        continue-on-error: true
        timeout-minutes: 20
        run: |
          set -euo pipefail
          if [ -n "${GHCR_PULL_USERNAME:-}" ] && [ -n "${GHCR_PULL_TOKEN:-}" ]; then
            printf '%s' "$GHCR_PULL_TOKEN" | docker login ghcr.io -u "$GHCR_PULL_USERNAME" --password-stdin
          fi
          cd "${YC_VM_DEPLOY_PATH}"
          git fetch origin "${DEPLOY_REF}"
          reconcile_tracked_prod_compose() {
            local path="docker-compose.prod.yml"
            if git diff --quiet -- "$path"; then
              return 0
            fi

            mkdir -p .deploy-state
            local stamp patch target_file
            stamp="$(date -u +%Y%m%dT%H%M%SZ)"
            patch=".deploy-state/docker-compose-prod-dirty-${stamp}.patch"
            git diff -- "$path" > "$patch"
            target_file="$(mktemp)"
            if ! git show "FETCH_HEAD:$path" > "$target_file"; then
              rm -f "$target_file"
              echo "::error::Could not read $path from fetched deploy ref; saved local patch at $patch."
              exit 1
            fi
            if cmp -s "$path" "$target_file"; then
              git checkout -- "$path"
              echo "Cleared local $path because it already matches the fetched deploy ref; saved patch at $patch."
            else
              echo "::error::Local $path differs from the fetched deploy ref; saved patch at $patch."
              git --no-pager diff --no-index -- "$target_file" "$path" || true
              rm -f "$target_file"
              exit 1
            fi
            rm -f "$target_file"
          }
          reconcile_tracked_prod_compose
          git checkout "${DEPLOY_REF}" || git checkout -B "${DEPLOY_REF}" "origin/${DEPLOY_REF}"
          git pull --ff-only origin "${DEPLOY_REF}"
          bash ./scripts/deploy-storefront-image.sh \
            --env-file .env \
            --compose-file docker-compose.runtime-slot.yml \
            --storefront-image-repository "${STOREFRONT_IMAGE_REPOSITORY}" \
            --storefront-image-tag "${STOREFRONT_IMAGE_TAG}" \
            --run-id "${DEPLOY_RUN_ID}"

      - name: Stage storefront diagnostics
        if: ${{ steps.deploy_remote.outcome == 'failure' }}
        run: |
          set -euo pipefail
          cd "${YC_VM_DEPLOY_PATH}"
          mkdir -p .deploy-state/export
          rm -f .deploy-state/export/*
          cp .deploy-state/latest-storefront-summary.txt .deploy-state/export/storefront-summary.txt 2>/dev/null || true
          latest_log="$(ls -1t .deploy-state/logs/storefront-deploy-*.log 2>/dev/null | head -n 1 || true)"
          if [ -n "$latest_log" ]; then
            cp "$latest_log" .deploy-state/export/
          fi

      - name: Prepare diagnostics artifact
        if: ${{ steps.deploy_remote.outcome == 'failure' }}
        run: |
          set -euo pipefail
          rm -rf storefront-diagnostics-production
          mkdir -p storefront-diagnostics-production
          if [ -d "${YC_VM_DEPLOY_PATH}/.deploy-state/export" ]; then
            cp -a "${YC_VM_DEPLOY_PATH}/.deploy-state/export/." storefront-diagnostics-production/
          fi

      - name: Upload diagnostics artifact
        if: ${{ steps.deploy_remote.outcome == 'failure' }}
        uses: actions/upload-artifact@v4
        with:
          name: production-storefront-deploy-diagnostics-${{ inputs.storefront_image_tag }}
          path: storefront-diagnostics-production
          if-no-files-found: warn

      - name: Fail workflow after remote deploy error
        if: ${{ steps.deploy_remote.outcome == 'failure' }}
        run: |
          echo "Production storefront deploy failed. See uploaded diagnostics."
          exit 1
