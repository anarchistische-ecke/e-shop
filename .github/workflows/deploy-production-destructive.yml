name: deploy-production-destructive

permissions:
  contents: read
  packages: write

on:
  workflow_dispatch:
    inputs:
      ref:
        description: Git ref to apply destructively in production
        required: true
        default: main
        type: string
      skip_backup:
        description: Skip Directus backup (only for emergency/manual restore scenarios)
        required: true
        default: false
        type: boolean

jobs:
  prepare:
    runs-on: ubuntu-latest
    outputs:
      sha: ${{ steps.git.outputs.sha }}
      image_repository: ${{ steps.image.outputs.repository }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ inputs.ref }}

      - name: Capture git metadata
        id: git
        run: |
          echo "sha=$(git rev-parse HEAD)" >> "$GITHUB_OUTPUT"

      - name: Compute image coordinates
        id: image
        run: |
          owner_lc="${GITHUB_REPOSITORY_OWNER,,}"
          echo "repository=ghcr.io/${owner_lc}/eshop-api" >> "$GITHUB_OUTPUT"

  build:
    needs: prepare
    runs-on: ubuntu-latest
    outputs:
      image_repository: ${{ needs.prepare.outputs.image_repository }}
      image_tag: ${{ needs.prepare.outputs.sha }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ inputs.ref }}

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Validate committed Directus schema snapshot
        run: node scripts/directus-schema.js validate --snapshot directus/schema/schema.snapshot.json

      - name: Verify committed Directus runtime extensions are up to date
        run: bash ./scripts/directus-extensions-build.sh --check

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21
          cache: maven

      - name: Build and test
        run: ./mvnw -B -ntp -pl api -am verify

      - name: Package API jar
        run: ./mvnw -B -ntp -pl api -am package -DskipTests

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push API image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: |
            ${{ needs.prepare.outputs.image_repository }}:${{ needs.prepare.outputs.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    needs: [prepare, build]
    runs-on: [self-hosted, prod-vm, prod-deploy]
    environment: production-destructive
    concurrency:
      group: deploy-production-destructive
      cancel-in-progress: false
    env:
      DEPLOY_REF: ${{ inputs.ref }}
      DEPLOY_SHA: ${{ needs.prepare.outputs.sha }}
      DEPLOY_RUN_ID: ${{ github.run_id }}
      YC_VM_DEPLOY_PATH: ${{ secrets.YC_VM_DEPLOY_PATH }}
      GHCR_PULL_USERNAME: ${{ secrets.GHCR_PULL_USERNAME }}
      GHCR_PULL_TOKEN: ${{ secrets.GHCR_PULL_TOKEN }}
      API_IMAGE_REPOSITORY: ${{ needs.build.outputs.image_repository }}
      API_IMAGE_TAG: ${{ needs.build.outputs.image_tag }}
      STOREFRONT_IMAGE_REPOSITORY: ${{ vars.STOREFRONT_IMAGE_REPOSITORY }}
      STOREFRONT_IMAGE_TAG: ${{ vars.STOREFRONT_IMAGE_TAG }}
      SKIP_BACKUP: ${{ inputs.skip_backup }}
    steps:
      - name: Skip deploy when VM deploy path is not configured
        if: ${{ env.YC_VM_DEPLOY_PATH == '' }}
        run: |
          echo "Skipping destructive production deploy because YC_VM_DEPLOY_PATH is missing."

      - name: Warn about direct destructive production apply
        run: |
          echo "::warning::This workflow applies destructive changes directly to production."
          echo "::warning::No separate staging target is configured for this repository."

      - name: Run destructive production apply
        id: deploy_remote
        if: ${{ env.YC_VM_DEPLOY_PATH != '' }}
        continue-on-error: true
        timeout-minutes: 45
        run: |
          set -euo pipefail
          if [ -n "${GHCR_PULL_USERNAME:-}" ] && [ -n "${GHCR_PULL_TOKEN:-}" ]; then
            printf '%s' "$GHCR_PULL_TOKEN" | docker login ghcr.io -u "$GHCR_PULL_USERNAME" --password-stdin
          fi
          cd "${YC_VM_DEPLOY_PATH}"
          git fetch origin "${DEPLOY_REF}"
          reconcile_deploy_worktree_path() {
            local path="$1"
            mkdir -p .deploy-state
            local stamp safe_name target_file
            stamp="$(date -u +%Y%m%dT%H%M%SZ)"
            safe_name="${path//\//-}"
            target_file="$(mktemp)"
            if ! git show "FETCH_HEAD:$path" > "$target_file"; then
              rm -f "$target_file"
              return 0
            fi

            if git ls-files --error-unmatch "$path" >/dev/null 2>&1; then
              if git diff --quiet -- "$path"; then
                rm -f "$target_file"
                return 0
              fi

              local patch=".deploy-state/${safe_name}-dirty-${stamp}.patch"
              git diff -- "$path" > "$patch"
              if cmp -s "$path" "$target_file"; then
                git checkout -- "$path"
                echo "Cleared local $path because it already matches the fetched deploy ref; saved patch at $patch."
              else
                echo "::error::Local $path differs from the fetched deploy ref; saved patch at $patch."
                git --no-pager diff --no-index -- "$target_file" "$path" || true
                rm -f "$target_file"
                exit 1
              fi
            elif [ -e "$path" ]; then
              local copy=".deploy-state/${safe_name}-untracked-${stamp}"
              cp -a "$path" "$copy"
              if cmp -s "$path" "$target_file"; then
                rm -f "$path"
                echo "Removed untracked $path because it already matches the fetched deploy ref; saved copy at $copy."
              else
                echo "::error::Untracked $path differs from the fetched deploy ref; saved copy at $copy."
                git --no-pager diff --no-index -- "$target_file" "$path" || true
                rm -f "$target_file"
                exit 1
              fi
            fi
            rm -f "$target_file"
          }
          reconcile_deploy_worktree_path "docker-compose.prod.yml"
          reconcile_deploy_worktree_path "directus/docker-compose.yml"
          reconcile_deploy_worktree_path "docker-compose.runtime-slot.yml"
          reconcile_deploy_worktree_path "scripts/keycloak-directus-session-policy.sh"
          git checkout "${DEPLOY_REF}" || git checkout -B "${DEPLOY_REF}" "origin/${DEPLOY_REF}"
          git pull --ff-only origin "${DEPLOY_REF}"
          destructive_args=""
          if [ "${SKIP_BACKUP}" = "true" ]; then
            destructive_args="--skip-backup"
          fi
          bash ./scripts/deploy-stack.sh \
            --env-file .env \
            --compose-file docker-compose.prod.yml \
            ${destructive_args}
          runtime_args=(
            bash ./scripts/deploy-runtime-bluegreen.sh
            --env-file .env
            --compose-file docker-compose.prod.yml
            --deploy-ref "${DEPLOY_REF}"
            --deploy-sha "${DEPLOY_SHA}"
            --api-image-repository "${API_IMAGE_REPOSITORY}"
            --api-image-tag "${API_IMAGE_TAG}"
            --run-id "${DEPLOY_RUN_ID}"
          )
          if [ -n "${STOREFRONT_IMAGE_REPOSITORY:-}" ]; then
            runtime_args+=(--storefront-image-repository "${STOREFRONT_IMAGE_REPOSITORY}")
          fi
          if [ -n "${STOREFRONT_IMAGE_TAG:-}" ]; then
            runtime_args+=(--storefront-image-tag "${STOREFRONT_IMAGE_TAG}")
          fi
          "${runtime_args[@]}"

      - name: Stage deploy diagnostics
        if: ${{ steps.deploy_remote.outcome == 'failure' }}
        run: |
          set -euo pipefail
          cd "${YC_VM_DEPLOY_PATH}"
          mkdir -p .deploy-state/export
          rm -f .deploy-state/export/*
          cp .deploy-state/latest-runtime-summary.txt .deploy-state/export/runtime-summary.txt 2>/dev/null || true
          latest_log="$(ls -1t .deploy-state/logs/*.log 2>/dev/null | head -n 1 || true)"
          if [ -n "$latest_log" ]; then
            cp "$latest_log" .deploy-state/export/
          fi

      - name: Prepare diagnostics artifact
        if: ${{ steps.deploy_remote.outcome == 'failure' }}
        run: |
          set -euo pipefail
          rm -rf destructive-diagnostics-production
          mkdir -p destructive-diagnostics-production
          if [ -d "${YC_VM_DEPLOY_PATH}/.deploy-state/export" ]; then
            cp -a "${YC_VM_DEPLOY_PATH}/.deploy-state/export/." destructive-diagnostics-production/
          fi

      - name: Upload diagnostics artifact
        if: ${{ steps.deploy_remote.outcome == 'failure' }}
        uses: actions/upload-artifact@v4
        with:
          name: production-destructive-diagnostics-${{ needs.prepare.outputs.sha }}
          path: destructive-diagnostics-production
          if-no-files-found: warn

      - name: Fail workflow after destructive deploy error
        if: ${{ steps.deploy_remote.outcome == 'failure' }}
        run: |
          echo "Destructive production apply failed. See uploaded diagnostics."
          exit 1
